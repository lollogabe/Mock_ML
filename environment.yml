name: jet-anomaly
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=24.0
  # PyTorch with CUDA 11.8 (swap pytorch-cuda=12.1 if needed)
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8
  - numpy>=1.24.0
  - matplotlib>=3.8.0
  - scikit-learn>=1.3.0
  - scipy>=1.11.0
  - tqdm>=4.66.0
  - seaborn>=0.13.0
  - pyyaml>=6.0
  - pip:
    - umap-learn>=0.5.4
    - python-dotenv>=1.0.0
    - pytest>=7.4.0
    - pytest-cov>=4.1.0
